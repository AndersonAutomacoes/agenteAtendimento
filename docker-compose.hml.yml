# Homologação: Postgres, Redis, Evolution, API, **web (Next.js :3000)**.
# A API e o painel vêm de imagens GHCR (sem --build no servidor; a pipeline publica e grava GHCR_IMAGE + GHCR_WEB_IMAGE no .env).
# Aceder ao site: http://<IP do VPS>:3000 — no .env do servidor, defina CEREBRO_CORS_ALLOWED_ORIGINS e (opcional) mail invite URL com a mesma origem.
# Deixar em /opt/axezap: .env, secrets/, e este ficheiro.
#
# No servidor, NÃO uses só "docker compose up" com o docker-compose.yml de desenvolvimento
# (ele faz build e precisa de Dockerfile; na pasta não há).
#   • docker compose -f docker-compose.hml.yml up -d
#   • ou, após deploy da pipeline, "docker compose up" porque a pipeline copia hml -> docker-compose.yml
#
# Uso: cd /opt/axezap && docker compose -f docker-compose.hml.yml pull && docker compose -f docker-compose.hml.yml up -d
# GHCR_IMAGE (minúsculas) vem do deploy na pipeline + .env; a pipeline copia também docker/postgres/init-evolution.sql
#
# Se o volume Postgres já existir sem a base `evolution`, cria-a uma vez:
#   docker exec -it cerebro-postgres psql -U cerebro -d postgres -c "CREATE DATABASE evolution;"

name: axezap-hml

networks:
  cerebro_internal:
    driver: bridge

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cerebro-postgres
    networks:
      - cerebro_internal
    environment:
      POSTGRES_USER: cerebro
      POSTGRES_PASSWORD: cerebro
      POSTGRES_DB: cerebro
    ports:
      - "5433:5432"
    volumes:
      - cerebro_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-evolution.sql:/docker-entrypoint-initdb.d/02-init-evolution.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerebro -d cerebro"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cerebro-redis
    networks:
      - cerebro_internal
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "cerebroredis"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "cerebroredis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:v2.3.6
    restart: always
    networks:
      - cerebro_internal
    ports:
      - "8083:8080"
    environment:
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://cerebro:cerebro@postgres:5432/evolution?schema=public
      # Sem isto, a API tenta redis://localhost (defeito interno) → "redis disconnected" em loop
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:cerebroredis@redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    image: ${GHCR_IMAGE:?GHCR_IMAGE_required_lowercase_ghcr}
    container_name: cerebro-api
    restart: always
    # Permite que o javaagent (dd-java-agent) envie APM para o Datadog no host:8126, não "localhost" do container
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      cerebro_internal:
        aliases:
          - cerebro-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cerebro
      SPRING_DATASOURCE_USERNAME: cerebro
      SPRING_DATASOURCE_PASSWORD: cerebro
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: cerebroredis
      SPRING_AI_VECTORSTORE_PGVECTOR_INITIALIZE_SCHEMA: "true"
      SPRING_AI_VECTORSTORE_PGVECTOR_DIMENSIONS: "768"
      # Obrigatório em runtime; no deploy use secret GEMINI_API_KEY no GitHub (pipeline grava .env) ou .env no servidor
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SPRING_AI_GOOGLE_GENAI_API_KEY: ${GEMINI_API_KEY:-}
      SPRING_AI_GOOGLE_GENAI_EMBEDDING_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-2.5-flash-lite}
      SPRING_AI_MODEL_EMBEDDING_TEXT: google-genai
      CEREBRO_WHATSAPP_EVOLUTION_BASE_URL: http://evolution-api:8080
      CEREBRO_WHATSAPP_EVOLUTION_API_KEY: ${AUTHENTICATION_API_KEY:-}
      # Base que o provisioning grava no webhook da instância (Evolution → POST no Cerebro). Rede Docker: http://cerebro-api:8080
      CEREBRO_WHATSAPP_EVOLUTION_WEBHOOK_PUBLIC_BASE_URL: ${CEREBRO_WHATSAPP_EVOLUTION_WEBHOOK_PUBLIC_BASE_URL:-}
      # Lista interativa de horários (Evolution sendList). Sobrescreva com TEXT se necessário.
      CEREBRO_WHATSAPP_EVOLUTION_INTERACTIVE_MODE: ${CEREBRO_WHATSAPP_EVOLUTION_INTERACTIVE_MODE:-LIST}
      # Auth do portal (/v1/auth/me): quando false OU ausente como "true", o Spring NÃO regista Firebase Admin SDK —
      # o verifier de fallback devolve sempre falha nos Bearer tokens → log «FirebaseTokenVerifier não configurado».
      # No .env na VPS (/opt/axezap/.env): CEREBRO_FIREBASE_ENABLED=true, FIREBASE_PROJECT_ID=<mesmo NEXT_PUBLIC_FIREBASE_*>,
      # e fecheiro real em ./secrets/firebase.json (volume abaixo; não usar placeholder quando enabled=true).
      CEREBRO_FIREBASE_ENABLED: ${CEREBRO_FIREBASE_ENABLED:-false}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_JSON_PATH: ${FIREBASE_SERVICE_ACCOUNT_JSON_PATH:-/run/firebase.json}
      CEREBRO_GOOGLE_CALENDAR_MOCK: ${CEREBRO_GOOGLE_CALENDAR_MOCK:-false}
      GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON_PATH: ${GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON_PATH:-/run/google-calendar-sa.json}
      CEREBRO_MAIL_INVITE_ENABLED: "true"
      CEREBRO_MAIL_INVITE_PROVIDER: ${CEREBRO_MAIL_INVITE_PROVIDER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CEREBRO_MAIL_INVITE_FROM_EMAIL: ${CEREBRO_MAIL_INVITE_FROM_EMAIL:-}
      CEREBRO_MAIL_INVITE_FROM_NAME: ${CEREBRO_MAIL_INVITE_FROM_NAME:-}
      CEREBRO_MAIL_INVITE_REGISTRATION_URL: ${CEREBRO_MAIL_INVITE_REGISTRATION_URL:-}
      CEREBRO_MAIL_INVITE_SUPPORT_EMAIL: ${CEREBRO_MAIL_INVITE_SUPPORT_EMAIL:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_URL: ${GROQ_API_URL:-https://api.groq.com/openai/v1/audio/transcriptions}
      GROQ_STT_MODEL: ${GROQ_STT_MODEL:-whisper-large-v3}
      GROQ_STT_LANGUAGE: ${GROQ_STT_LANGUAGE:-pt}
      GROQ_STT_REQUEST_TIMEOUT_MS: ${GROQ_STT_REQUEST_TIMEOUT_MS:-2000}
      DD_SERVICE: axezap-hml
      DD_ENV: hml
      DD_VERSION: 1.0.0
      # Já o Dockerfile; sem isto, ConnectException a localhost:8126 (o agente está no host, não no container)
      DD_TRACE_AGENT_URL: ${DD_TRACE_AGENT_URL:-http://host.docker.internal:8126}
      DD_TRACE_ENABLED: ${DD_TRACE_ENABLED:-true}
      # Várias origens com vírgula; inclua http://<IP_PÚBLICO>:3000 para o painel (Next) falar com a API
      CEREBRO_CORS_ALLOWED_ORIGINS: ${CEREBRO_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    labels:
      com.datadoghq.ad.logs: '[{"source": "java", "service": "axezap-hml"}]'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      # Flyway + Spring + pgvector podem ultrapassar 90s em cold start no droplet
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_started
    volumes:
      # Bind explícito: sem espaço em ${VAR:-default}; senão Compose pode interpretar como volume nomeado inexistente.
      # Sem o ficheiro no host é preciso criar ./secrets/google-calendar-sa.json (pipeline) ou remover GOOGLE_CALENDAR_CREDENTIALS_FILE do .env.
      - type: bind
        source: ${GOOGLE_CALENDAR_CREDENTIALS_FILE:-./secrets/google-calendar-sa.json}
        target: /run/google-calendar-sa.json
        read_only: true
      - ./secrets/firebase.json:/run/firebase.json:ro

  # Painel Next.js (produção = rewrites no servidor internos para a API; browser só fala com :3000)
  web:
    image: ${GHCR_WEB_IMAGE:?GHCR_WEB_IMAGE_required_e_g_pipeline_ghcr_web}
    container_name: cerebro-web
    restart: always
    networks:
      - cerebro_internal
    ports:
      - "3000:3000"
    environment:
      FIREBASE_SERVICE_ACCOUNT_JSON_PATH: ${FIREBASE_SERVICE_ACCOUNT_JSON_PATH:-/run/firebase.json}
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./secrets/firebase.json:/run/firebase.json:ro

volumes:
  cerebro_pgdata:
  evolution_instances:
