name: AxeZap CI/CD Pipeline

on:
  push:
    branches: [ "develop" ]
    tags: [ "v*.*.*" ] # Gatilho para Produção via Release
  pull_request:
    branches: [ "main" ] # Garante que o PR seja validado antes do merge

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: bootstrap/target/*.jar

  build-push-ghcr:
    needs: build-and-test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image name (lowercase for GHCR)
        id: image
        run: echo "name=${{ env.REGISTRY }}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:develop
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-hml:
    needs: build-push-ghcr
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image name (lowercase for GHCR)
        id: image
        run: echo "name=${{ env.REGISTRY }}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Create deploy directory on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP_HML }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            mkdir -p /opt/axezap
            chmod 755 /opt/axezap

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP_HML }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "docker-compose.hml.yml"
          target: /opt/axezap/
          strip_components: 0
          overwrite: true

      - name: Remote pull and up
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_IMAGE: ${{ steps.image.outputs.name }}:develop
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          DATABASE_URL_HML: ${{ secrets.DATABASE_URL_HML }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          host: ${{ secrets.SERVER_IP_HML }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 30m
          script_stop: true
          envs: GHCR_IMAGE,GHCR_READ_TOKEN,DATABASE_URL_HML,GROQ_API_KEY,GEMINI_API_KEY
          script: |
            set -e
            mkdir -p /opt/axezap
            cd /opt/axezap
            if [ -z "${GHCR_IMAGE:-}" ]; then
              echo "ERRO: GHCR_IMAGE vazio" >&2
              exit 1
            fi
            GHCR_IMAGE=$(printf '%s' "$GHCR_IMAGE" | tr '[:upper:]' '[:lower:]')
            export GHCR_IMAGE
            echo "=== GHCR_IMAGE (minúsculas) ==="
            echo "$GHCR_IMAGE"
            echo "=== merge .env (chaves reescritas a partir dos secrets do GitHub) ==="
            umask 026
            touch .env
            # Remove reescritas anteriores; SPRING_DATASOURCE_URL: cópia com host "postgres" em ambientes antigos
            awk '/^(GHCR_IMAGE|DATABASE_URL_HML|GROQ_API_KEY|GEMINI_API_KEY|SPRING_DATASOURCE_URL)=/{next}1' .env > .env.tmp
            mv .env.tmp .env
            {
              echo "GHCR_IMAGE=$GHCR_IMAGE"
              echo "DATABASE_URL_HML=$DATABASE_URL_HML"
              echo "GROQ_API_KEY=$GROQ_API_KEY"
              echo "GEMINI_API_KEY=$GEMINI_API_KEY"
            } >> .env
            echo "=== docker login ghcr.io (stderr/stdout) ==="
            if [ -n "${GHCR_READ_TOKEN:-}" ]; then
              echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            else
              echo "AVISO: GHCR_READ_TOKEN vazio; sem login (pull de imagem privada pode falhar)" >&2
            fi
            echo "=== docker compose down --remove-orphans (liberta portas, remove órfãos p.ex. axezap-hml) ==="
            docker compose -f docker-compose.hml.yml down --remove-orphans 2>&1 || true
            docker rm -f axezap-hml 2>/dev/null || true
            echo "=== docker compose -f docker-compose.hml.yml pull (stderr/stdout) ==="
            docker compose -f docker-compose.hml.yml pull
            echo "=== docker compose -f docker-compose.hml.yml up -d --force-recreate (stderr/stdout) ==="
            docker compose -f docker-compose.hml.yml up -d --force-recreate

  deploy-prd:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production
        run: echo "Executando deploy de release ${{ github.ref_name }} em PRD (definir job quando PRD estiver pronto)."
