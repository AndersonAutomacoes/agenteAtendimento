# PostgreSQL (pgvector) + Redis + API Spring Boot (imagem local via Dockerfile)
# Uso: docker compose up -d --build
#
# Só Gemini (chat + embeddings RAG). OPENAI não é usado por defeito (cerebro.ai.openai-chat-enabled=false).
# .env na raiz (ver também .env.example):
#   GEMINI_API_KEY=...   # obrigatório para api
#   cp .env.example .env
#
# Testes com Testcontainers: eles chamam a API do Docker Engine para SUBIR OUTRO container
# (imagem pgvector), não usam este Postgres automaticamente.
# - Windows (Maven nativo): perfil docker-windows-npipe define DOCKER_HOST=npipe (pipe
#   dockerDesktopLinuxEngine, como no contexto desktop-linux do Docker Desktop).
# - WSL2 (Maven na distro Linux): Maven vê os.family=unix; use o socket Docker padrão ou
#   export DOCKER_HOST=unix:///var/run/docker.sock antes do mvn se precisar.
# - Linux/CI: socket padrão ou export DOCKER_HOST=…; variável de ambiente sobrescreve classpath.
# - Testcontainers com JDK 24+ no Windows: se o Engine estiver ok mas os testes não acharem Docker,
#   tente JAVA_HOME=JDK 21 LTS (compatibilidade do cliente Docker em Java).
# - Sem API Docker: CEREBRO_IT_USE_LOCAL_PG=true + testes *LocalPostgresTest em localhost:5433.
#
# Padrões (alinhados ao application.yml):
#   PostgreSQL no host: porta 5433 → 5432 no container (evita colisão com Postgres local na 5432).
#   Usuário/senha/banco: cerebro / cerebro / cerebro
#   Redis: senha cerebroredis / porta 6379
#
# Se você mudou POSTGRES_USER ou criou o volume com outra configuração e vê
# "role ... does not exist", o data dir já foi inicializado: pare e remova o volume
#   docker compose down -v
#   docker compose up -d
#
# Webhook Evolution → cerebro-api: use http://api:8080/... ou http://cerebro-api:8080/...
# (alias DNS no serviço api). Dentro do container evolution_api, localhost NÃO é o Spring.
#
# Homologação: ver docker-compose.hml.yml (mesma stack; a API vem de imagem GHCR no servidor).

networks:
  cerebro_internal:
    driver: bridge

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cerebro-postgres
    networks:
      - cerebro_internal
    environment:
      POSTGRES_USER: cerebro
      POSTGRES_PASSWORD: cerebro
      POSTGRES_DB: cerebro
    ports:
      - "5433:5432"
    volumes:
      - cerebro_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-evolution.sql:/docker-entrypoint-initdb.d/02-init-evolution.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerebro -d cerebro"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cerebro-redis
    networks:
      - cerebro_internal
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "cerebroredis"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "cerebroredis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:v2.3.6
    restart: always
    networks:
      - cerebro_internal
    ports:
      - "8083:8080"
    environment:
      # Evita "Database provider invalid" se o .env no host não definir (p.ex. deploy HML)
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://cerebro:cerebro@postgres:5432/evolution?schema=public
      # O .env padrão da imagem usa redis://localhost:6379; no stack Docker o host correcto é o serviço "redis" e a password CEREBRO.
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:cerebroredis@redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cerebro-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      cerebro_internal:
        aliases:
          - cerebro-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cerebro
      SPRING_DATASOURCE_USERNAME: cerebro
      SPRING_DATASOURCE_PASSWORD: cerebro
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: cerebroredis
      # Tabela pgvector criada na primeira subida (Flyway trata o restante)
      SPRING_AI_VECTORSTORE_PGVECTOR_INITIALIZE_SCHEMA: "true"
      SPRING_AI_VECTORSTORE_PGVECTOR_DIMENSIONS: "768"
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY in .env (Gemini chat + embeddings)}
      # Binding explícito Spring (relaxed binding) para chat + client Gemini
      SPRING_AI_GOOGLE_GENAI_API_KEY: ${GEMINI_API_KEY}
      # Garante binding mesmo se o YAML não for aplicado como esperado
      SPRING_AI_GOOGLE_GENAI_EMBEDDING_API_KEY: ${GEMINI_API_KEY}
      # Ativa GoogleGenAiTextEmbeddingAutoConfiguration (evita falha sem EmbeddingModel se o JAR foi buildado com YAML antigo)
      SPRING_AI_MODEL_EMBEDDING_TEXT: google-genai
      # Evolution: dentro do container não use localhost:8083; serviço Compose escuta na 8080.
      CEREBRO_WHATSAPP_EVOLUTION_BASE_URL: http://evolution-api:8080
      # Local: por defeito false (sem credenciais no container). Para portal Auth: no .env use
      # CEREBRO_FIREBASE_ENABLED=true + FIREBASE_PROJECT_ID + montar o JSON (ver .env.example).
      CEREBRO_FIREBASE_ENABLED: ${CEREBRO_FIREBASE_ENABLED:-true}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      # Alinhar com o volume em ./secrets/...:/run/firebase.json — sem isto o Spring usa ADC (inexistente no container).
      FIREBASE_SERVICE_ACCOUNT_JSON_PATH: ${FIREBASE_SERVICE_ACCOUNT_JSON_PATH:-/run/firebase.json}
      # Agendamento: false = Google Calendar API (GoogleCalendarService + SA). true = MockAppointmentSchedulingService (sem Google).
      # Alinhado com application.yml; use CEREBRO_GOOGLE_CALENDAR_MOCK=true no .env só para desenvolver sem credenciais.
      CEREBRO_GOOGLE_CALENDAR_MOCK: ${CEREBRO_GOOGLE_CALENDAR_MOCK:-false}
      # Caminho dentro do container; o bind mount abaixo coloca o JSON da service account (Calendar API).
      GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON_PATH: ${GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON_PATH:-/run/google-calendar-sa.json}
      # Convites por e-mail (Resend)
      CEREBRO_MAIL_INVITE_ENABLED: "true"
      CEREBRO_MAIL_INVITE_PROVIDER: ${CEREBRO_MAIL_INVITE_PROVIDER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CEREBRO_MAIL_INVITE_FROM_EMAIL: ${CEREBRO_MAIL_INVITE_FROM_EMAIL:-}
      CEREBRO_MAIL_INVITE_FROM_NAME: ${CEREBRO_MAIL_INVITE_FROM_NAME:-}
      CEREBRO_MAIL_INVITE_REGISTRATION_URL: ${CEREBRO_MAIL_INVITE_REGISTRATION_URL:-}
      CEREBRO_MAIL_INVITE_SUPPORT_EMAIL: ${CEREBRO_MAIL_INVITE_SUPPORT_EMAIL:-}
      # STT Groq (Whisper)
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_URL: ${GROQ_API_URL:-https://api.groq.com/openai/v1/audio/transcriptions}
      GROQ_STT_MODEL: ${GROQ_STT_MODEL:-whisper-large-v3}
      GROQ_STT_LANGUAGE: ${GROQ_STT_LANGUAGE:-pt}
      GROQ_STT_REQUEST_TIMEOUT_MS: ${GROQ_STT_REQUEST_TIMEOUT_MS:-2000}
      # Datadog APM: agent no host. Sem agente, no .env: DD_TRACE_ENABLED=false
      DD_TRACE_AGENT_URL: ${DD_TRACE_AGENT_URL:-http://host.docker.internal:8126}
      DD_TRACE_ENABLED: ${DD_TRACE_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_started
    volumes:
      - ./secrets/gen-lang-client-0922152835-firebase-adminsdk-fbsvc-525d75aa1f.json:/run/firebase.json:ro
      # Google Calendar: mesmo JSON de service account que em bootstrap (ou copie para secrets/). Host: variável opcional.
      - ${GOOGLE_CALENDAR_CREDENTIALS_FILE:-./bootstrap/src/main/resources/credentials.json}:/run/google-calendar-sa.json:ro

volumes:
  cerebro_pgdata:
  evolution_instances:
