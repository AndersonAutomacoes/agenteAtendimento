# Configuração opcional do Testcontainers (https://java.testcontainers.org/features/configuration/)
#
# Ordem de precedência (maior primeiro): variáveis de ambiente, ~/.testcontainers.properties,
# classpath (este arquivo).
#
# Windows + Docker Desktop: o perfil docker-windows-npipe define DOCKER_HOST no fork (pipe
# dockerDesktopLinuxEngine — alinhado ao contexto desktop-linux). Se usar engine legada,
# export DOCKER_HOST=npipe:////./pipe/docker_engine antes do mvn.
#
# Linux/CI: não definir docker.host aqui; o socket padrão costuma bastar. Para sobrescrever,
# exporte DOCKER_HOST antes do mvn ou use ~/.testcontainers.properties.
#
# WSL2 (Maven rodando na distro Linux): os.family=unix — não usa o perfil Windows; use o
# socket padrão ou export DOCKER_HOST=unix:///var/run/docker.sock se necessário.
#
# docker.host=npipe:////./pipe/docker_engine
