openapi: 3.0.3
info:
  title: Cerebro API
  description: |
    Contrato único dos endpoints HTTP expostos pela aplicação **até ao momento**.

    - Rotas **Apache Camel** (servlet em `/api/*`): prefixo `/api/v1/...`.
    - Rotas **Spring MVC** (DispatcherServlet na raiz): prefixo `/v1/...` (sem `/api`).

    Autenticação: **Firebase ID Token** (Bearer) para dashboard, analytics e sessão; `POST /v1/auth/register` exige conta Firebase ainda sem tenant (convite).
    Outras rotas Camel permanecem abertas salvo indicação em contrário.
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: Desenvolvimento local

tags:
  - name: Chat
    description: Atendimento com RAG (Camel)
  - name: Tenant settings
    description: Configuração do tenant e WhatsApp (Camel)
  - name: WhatsApp webhook
    description: Webhook inbound Meta / Evolution / testes (Camel)
  - name: Monitoring
    description: Histórico de mensagens para monitorização (Camel)
  - name: Dashboard
    description: Indicadores agregados do tenant (Camel)
  - name: Analytics
    description: Métricas de volume e sucesso para o dashboard (Camel)
  - name: Knowledge base
    description: Listagem e remoção de arquivos na base vetorial (Camel)
  - name: Ingestão
    description: Upload de documentos para a base de conhecimento (Spring MVC)
  - name: Bot
    description: Personalidade do bot (Spring MVC)
  - name: Auth
    description: Registo com convite e sessão portal (Spring MVC, Firebase ID Token)

paths:
  /api/v1/chat:
    post:
      tags: [Chat]
      summary: Chat com o assistente
      operationId: postChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatHttpRequest"
            examples:
              padrao:
                value:
                  tenantId: oficina
                  sessionId: sessao-1
                  message: Qual o horário de atendimento?
      responses:
        "200":
          description: Resposta do assistente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResult"
        "504":
          description: Timeout do circuito (resposta de fallback no corpo)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResult"
        "503":
          description: Erro no circuito / manutenção (corpo com mensagem de fallback)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResult"

  /api/v1/tenant/settings:
    get:
      tags: [Tenant settings]
      summary: Obter configuração do tenant
      operationId: getTenantSettings
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
          description: Identificador do tenant (ex. oficina)
      responses:
        "200":
          description: Configuração atual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSettingsResponse"
        "400":
          description: tenantId em falta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"
    put:
      tags: [Tenant settings]
      summary: Atualizar configuração do tenant
      operationId: putTenantSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantSettingsHttpRequest"
      responses:
        "204":
          description: Atualizado com sucesso (sem corpo)
        "400":
          description: Validação ou tipo de provedor inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"

  /api/v1/knowledge-base:
    get:
      tags: [Knowledge base]
      summary: Listar arquivos indexados na base vetorial
      operationId: listKnowledgeBaseFiles
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
          description: Identificador do tenant (conta)
      responses:
        "200":
          description: Lista agregada por envio (ingestion batch)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeFileSummary"
        "400":
          description: tenantId em falta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"

  /api/v1/knowledge-base/{batchId}:
    delete:
      tags: [Knowledge base]
      summary: Remover um arquivo indexado e todos os seus vetores
      operationId: deleteKnowledgeBaseFile
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
          description: ID do envio (ingestion_batch_id nos metadados)
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Vectores removidos
        "400":
          description: Parâmetros em falta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"
        "404":
          description: Nenhum vector encontrado para esse batch e tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"

  /api/v1/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Resumo para o painel (cartões, série temporal, atividades recentes)
      operationId: getDashboardSummary
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [day, week, month]
            default: day
          description: day = últimas 24h (por hora); week = 7 dias; month = 30 dias (ignorado se startDate+endDate presentes)
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: ISO-8601 instant; início meia-aberto com endDate — obrigatório em conjunto com endDate
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: ISO-8601 instant; intervalo [startDate, endDate); máx. 366 dias
      responses:
        "200":
          description: Métricas e série para Recharts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "400":
          description: tenantId em falta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"
        "401":
          description: JWT em falta ou inválido
        "403":
          description: Perfil BASIC (requer PRO)

  /api/v1/messages:
    get:
      tags: [Monitoring]
      summary: Últimas mensagens WhatsApp do tenant
      operationId: getChatMessages
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
          description: Identificador do tenant
      responses:
        "200":
          description: Até 50 mensagens mais recentes (ordem decrescente por data) e estado `botEnabledByPhone` por contacto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessagesListResponse"
        "400":
          description: tenantId em falta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"

  /api/v1/conversations/human-handoff:
    post:
      tags: [Monitoring]
      summary: Assumir conversa (desliga IA e notifica o cliente no WhatsApp)
      operationId: humanHandoffConversation
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationPhoneBody"
      responses:
        "204":
          description: Estado gravado; notificação enviada apenas na primeira transição para modo humano
        "400":
          description: tenantId ou phoneNumber em falta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"
        "502":
          description: Falha ao enviar a mensagem WhatsApp de notificação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"

  /api/v1/conversations/enable-bot:
    post:
      tags: [Monitoring]
      summary: Reativar IA para o contacto
      operationId: enableBotForConversation
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationPhoneBody"
      responses:
        "204":
          description: IA voltará a responder a novas mensagens deste número
        "400":
          description: tenantId ou phoneNumber em falta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"

  /api/v1/messages/{id}/retry:
    post:
      tags: [Monitoring]
      summary: Reenviar resposta ASSISTANT com status ERROR
      description: |
        Repõe o status para RECEIVED e volta a despachar o outbound WhatsApp para o mesmo conteúdo e número,
        reutilizando o mesmo registo em `chat_message`.
      operationId: retryChatMessage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID da linha em `chat_message`
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
          description: Deve coincidir com o tenant da mensagem
      responses:
        "204":
          description: Reenvio aceite (processamento assíncrono via Camel)
        "400":
          description: tenantId em falta ou id inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"
        "404":
          description: Mensagem inexistente para o tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"
        "409":
          description: Mensagem não é ASSISTANT com status ERROR
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"

  /api/v1/analytics/summary:
    get:
      tags: [Analytics]
      summary: Sumário de analytics (últimas 24 horas)
      description: |
        Total de mensagens, contactos distintos (`phone_number`) e taxa de sucesso das respostas ASSISTANT
        terminadas (SENT vs ERROR), para a janela `[agora − 24h, agora)`. Timestamps em UTC (ISO-8601).
      operationId: getAnalyticsSummary
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
          description: Identificador do tenant
      responses:
        "200":
          description: Métricas agregadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummaryHttpResponse"
        "400":
          description: tenantId em falta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"

  /api/v1/analytics/hourly-messages:
    get:
      tags: [Analytics]
      summary: Volume de mensagens por hora (UTC)
      description: |
        Série horária com buckets contínuos em UTC (zeros onde não houve mensagens). Janela `[agora − hours, agora)`.
      operationId: getAnalyticsHourlyMessages
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: hours
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 24
            minimum: 1
            maximum: 168
          description: Horas a incluir (1–168); por defeito 24
      responses:
        "200":
          description: Pontos por hora
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsHourlyMessagesHttpResponse"
        "400":
          description: tenantId em falta ou hours inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"

  /api/v1/analytics/intents:
    get:
      tags: [Analytics]
      summary: Contagem por intenção principal (conversas classificadas)
      description: |
        Agrega linhas de `analytics_intents` por categoria na janela `[agora − days, agora)`.
        A resposta inclui **todas** as categorias com contagem (zero quando não houver dados), para gráficos de pizza estáveis.
      operationId: getAnalyticsIntents
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: days
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 30
            minimum: 1
            maximum: 366
          description: Dias corridos a incluir (1–366); ignorado se startDate+endDate estiverem presentes
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Contagens por categoria
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsIntentsHttpResponse"
        "400":
          description: tenantId em falta, days inválido ou período ISO inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"

  /api/v1/analytics/stats:
    get:
      tags: [Analytics]
      summary: Contagens por intenção e sentimento (chat_analytics)
      description: |
        Agrega a tabela `chat_analytics` (último estado por conversa tenant + telefone), útil para gráficos de
        intenção e sentimento classificados via Gemini após cada turno WhatsApp.
      operationId: getAnalyticsChatStats
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Filtra por last_updated em [startDate, endDate); opcional com endDate
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Contagens com todas as categorias (zeros incluídos)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatAnalyticsStatsHttpResponse"
        "400":
          description: tenantId em falta ou período inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"

  /api/v1/analytics/export:
    get:
      tags: [Analytics]
      summary: Exportar relatório CSV ou PDF
      description: |
        Exige `startDate` e `endDate` (ISO-8601 instant), intervalo meia-aberto `[start, end)`, máximo 366 dias.
        Cabeçalhos e textos seguem `locale` (pt-BR, en, es, zh-CN).
        CSV requer perfil **PRO**; PDF requer **ULTRA**.
      operationId: exportAnalyticsReport
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [csv, pdf]
        - name: locale
          in: query
          required: false
          schema:
            type: string
            enum: [pt-BR, en, es, zh-CN]
            default: pt-BR
      responses:
        "200":
          description: Ficheiro em anexo
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: Parâmetros em falta ou inválidos

  /api/v1/whatsapp/webhook:
    post:
      tags: [WhatsApp webhook]
      summary: Webhook WhatsApp (corpo JSON)
      description: |
        Aceita JSON simples de teste, envelope **Meta** (`entry`) ou **Evolution** v2 (`event` + `data`).
        Respostas `ignored` quando o evento não for tratado ou `processed` após fluxo de chat.
      operationId: postWhatsAppWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/WhatsAppWebhookSimpleBody"
                - $ref: "#/components/schemas/WhatsAppWebhookMetaEnvelope"
                - $ref: "#/components/schemas/WhatsAppWebhookEvolutionMessagesUpsert"
            examples:
              testeSimples:
                summary: Teste manual
                value:
                  from: "5511999999999"
                  text: Olá
              evolution:
                summary: Evolution messages.upsert (simplificado)
                value:
                  event: messages.upsert
                  data:
                    key:
                      remoteJid: "5511999999999@s.whatsapp.net"
                      fromMe: false
                    message:
                      conversation: Olá
                    messageType: conversation
      responses:
        "200":
          description: Evento aceite (pode ser ignorado ou processado)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppWebhookResponse"
        "400":
          description: Mensagem inválida ou JSON ilegível
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"
        "404":
          description: Número sem tenant associado (`cerebro.whatsapp.tenants` / configuração)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"

  /api/v1/whatsapp/webhook/{event}:
    post:
      tags: [WhatsApp webhook]
      summary: Webhook WhatsApp (path com nome do evento)
      description: O mesmo processamento que `POST /api/v1/whatsapp/webhook`, para clientes que apendem o evento ao path (ex. Evolution “Webhook by Events”).
      operationId: postWhatsAppWebhookWithEvent
      parameters:
        - name: event
          in: path
          required: true
          schema:
            type: string
          examples:
            MESSAGES_UPSERT:
              value: MESSAGES_UPSERT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/WhatsAppWebhookSimpleBody"
                - $ref: "#/components/schemas/WhatsAppWebhookMetaEnvelope"
                - $ref: "#/components/schemas/WhatsAppWebhookEvolutionMessagesUpsert"
      responses:
        "200":
          description: Evento aceite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppWebhookResponse"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"

  /v1/auth/register:
    post:
      tags: [Auth]
      summary: Associar conta Firebase a um tenant (convite)
      description: |
        Requer `Authorization: Bearer` com ID Token Firebase de utilizador **ainda sem** linha em `portal_user`.
        O corpo contém o código de convite em texto; o backend armazena apenas o hash SHA-256.
      operationId: postPortalRegister
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortalRegisterRequest"
      responses:
        "200":
          description: Tenant associado e perfil inicial (BASIC)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalRegisterResponse"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"
        "401":
          description: Token em falta ou inválido
        "403":
          description: Conta já associada a um tenant
        "409":
          description: Utilizador já registado ou convite inválido

  /v1/auth/me:
    get:
      tags: [Auth]
      summary: Dados da sessão (ID Token Firebase)
      operationId: getPortalSession
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalSessionResponse"
        "401":
          description: Token em falta ou inválido

  /v1/ingest:
    post:
      tags: [Ingestão]
      summary: Ingerir arquivo (multipart)
      description: |
        `tenantId` vai na **query string**; o arquivo no part `file`.
        Endpoint Spring MVC (não usa o prefixo `/api`).
      operationId: postIngest
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Documento (PDF, texto, etc. conforme extração configurada)
      responses:
        "200":
          description: Número de chunks gravados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestHttpResponse"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"

  /v1/bot-settings:
    put:
      tags: [Bot]
      summary: Atualizar só a personalidade (system prompt) do bot
      description: Atualização parcial da persona; endpoint Spring MVC em `/v1` (sem `/api`).
      operationId: putBotSettings
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotSettingsPutRequest"
      responses:
        "204":
          description: Atualizado com sucesso
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase ID Token (claims `tenant_id` / `profile_level` após registo)

  schemas:
    PortalRegisterRequest:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string
          description: Código de convite em texto claro

    PortalRegisterResponse:
      type: object
      required: [tenantId, profileLevel]
      properties:
        tenantId:
          type: string
        profileLevel:
          type: string
          enum: [BASIC, PRO, ULTRA]

    PortalSessionResponse:
      type: object
      required: [tenantId, profileLevel]
      properties:
        tenantId:
          type: string
        profileLevel:
          type: string
          enum: [BASIC, PRO, ULTRA]

    ChatHttpRequest:
      type: object
      required: [tenantId, sessionId, message]
      properties:
        tenantId:
          type: string
        sessionId:
          type: string
          description: Alias JSON aceite — `conversationId`
        message:
          type: string
          description: Alias JSON aceite — `userMessage`
        topK:
          type: integer
          format: int32
          description: Top-K para RAG (opcional)
        aiProvider:
          type: string
          enum: [GEMINI, OPENAI]
          description: Por defeito vem de `cerebro.ai.default-chat-provider`; OPENAI só se ativado no servidor

    KnowledgeFileSummary:
      type: object
      description: Item da lista GET /api/v1/knowledge-base (DTO JSON; uploadedAt em ISO-8601)
      required: [batchId, fileName, uploadedAt, sizeBytes, chunkCount, status]
      properties:
        batchId:
          type: string
        fileName:
          type: string
        uploadedAt:
          type: string
          format: date-time
        sizeBytes:
          type: integer
          format: int64
        chunkCount:
          type: integer
          format: int32
        status:
          type: string
          description: READY quando o envio já está indexado

    DashboardSummary:
      type: object
      properties:
        totalClients:
          type: integer
          format: int64
        messagesToday:
          type: integer
          format: int64
        aiRatePercent:
          type: number
          format: double
          nullable: true
        instanceStatus:
          type: string
          description: SIMULATED, CONFIGURED ou INCOMPLETE
        series:
          type: array
          items:
            $ref: "#/components/schemas/DashboardSeriesPoint"
        recentInteractions:
          type: array
          items:
            $ref: "#/components/schemas/DashboardRecentInteraction"

    DashboardSeriesPoint:
      type: object
      properties:
        bucketStart:
          type: string
          format: date-time
        count:
          type: integer
          format: int64

    DashboardRecentInteraction:
      type: object
      properties:
        messageId:
          type: integer
          format: int64
        phoneNumber:
          type: string
        contactDisplayName:
          type: string
          nullable: true
        contactProfilePicUrl:
          type: string
          nullable: true
        detectedIntent:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
        content:
          type: string

    AnalyticsSummaryHttpResponse:
      type: object
      required:
        [tenantId, periodStart, periodEnd, totalMessages, uniqueUsers]
      properties:
        tenantId:
          type: string
        periodStart:
          type: string
          format: date-time
          description: Início da janela (UTC, ISO-8601)
        periodEnd:
          type: string
          format: date-time
          description: Fim exclusivo da janela (UTC, ISO-8601)
        totalMessages:
          type: integer
          format: int64
        uniqueUsers:
          type: integer
          format: int64
          description: Número de `phone_number` distintos
        successRatePercent:
          type: number
          format: double
          nullable: true
          description: ASSISTANT com status SENT / (SENT + ERROR); null se não houver amostra terminal

    AnalyticsHourlyMessagesHttpResponse:
      type: object
      required: [tenantId, hours, periodStart, periodEnd, points]
      properties:
        tenantId:
          type: string
        hours:
          type: integer
          format: int32
        periodStart:
          type: string
          format: date-time
        periodEnd:
          type: string
          format: date-time
        points:
          type: array
          items:
            $ref: "#/components/schemas/HourlyPointHttpResponse"

    HourlyPointHttpResponse:
      type: object
      required: [bucketStartUtc, messageCount]
      properties:
        bucketStartUtc:
          type: string
          format: date-time
          description: Início do bucket horário em UTC (ISO-8601)
        messageCount:
          type: integer
          format: int64

    AnalyticsIntentsHttpResponse:
      type: object
      required: [tenantId, days, periodStart, periodEnd, counts]
      properties:
        tenantId:
          type: string
        days:
          type: integer
          format: int32
        periodStart:
          type: string
          format: date-time
          description: Início inclusivo da janela (UTC, ISO-8601)
        periodEnd:
          type: string
          format: date-time
          description: Fim exclusivo da janela (UTC, ISO-8601)
        counts:
          type: array
          items:
            $ref: "#/components/schemas/IntentCategoryCountHttp"

    IntentCategoryCountHttp:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
          enum: [ORCAMENTO, AGENDAMENTO, DUVIDA_TECNICA, RECLAMACAO, OUTRO]
        count:
          type: integer
          format: int64

    ChatAnalyticsStatsHttpResponse:
      type: object
      required: [tenantId, generatedAt, intents, sentiments]
      properties:
        tenantId:
          type: string
        generatedAt:
          type: string
          format: date-time
          description: Momento da agregação (UTC, ISO-8601)
        intents:
          type: array
          description: Contagem por intenção (Venda, Suporte, Orçamento, Agendamento, Outros)
          items:
            $ref: "#/components/schemas/ChatAnalyticsLabelCountHttp"
        sentiments:
          type: array
          description: Contagem por sentimento (Positivo, Neutro, Negativo)
          items:
            $ref: "#/components/schemas/ChatAnalyticsLabelCountHttp"

    ChatAnalyticsLabelCountHttp:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer
          format: int64

    ChatMessagesListResponse:
      type: object
      required: [messages, botEnabledByPhone]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessageItemResponse"
        botEnabledByPhone:
          type: object
          additionalProperties:
            type: boolean
          description: Telefone (como em chat_message) → valor de `conversation.is_bot_enabled`; omissão de chave equivale a true

    ConversationPhoneBody:
      type: object
      required: [phoneNumber]
      properties:
        phoneNumber:
          type: string
          description: Mesmo valor que em chat_message para o contacto

    ChatMessageItemResponse:
      type: object
      required: [id, tenantId, phoneNumber, role, content, status, timestamp]
      properties:
        id:
          type: integer
          format: int64
        tenantId:
          type: string
        phoneNumber:
          type: string
        contactDisplayName:
          type: string
          nullable: true
          description: Nome do contacto (ex. Evolution pushName), quando disponível
        contactProfilePicUrl:
          type: string
          nullable: true
        detectedIntent:
          type: string
          nullable: true
          description: Etiqueta de intenção inferida pela IA para mensagens USER
        role:
          type: string
          enum: [USER, ASSISTANT]
        content:
          type: string
        status:
          type: string
          enum: [RECEIVED, SENT, ERROR]
        timestamp:
          type: string
          format: date-time

    ChatResult:
      type: object
      required: [assistantMessage]
      description: Resposta do modelo (inclui mensagens de fallback do circuito)
      properties:
        assistantMessage:
          type: string

    TenantSettingsResponse:
      type: object
      properties:
        tenantId:
          type: string
        profileLevel:
          type: string
          enum: [BASIC, PRO, ULTRA]
        systemPrompt:
          type: string
          nullable: true
        whatsappProviderType:
          type: string
          description: SIMULATED, META ou EVOLUTION
          nullable: true
        whatsappApiKey:
          type: string
          nullable: true
        whatsappInstanceId:
          type: string
          nullable: true
        whatsappBaseUrl:
          type: string
          nullable: true
        googleCalendarId:
          type: string
          description: ID do calendário Google partilhado com a service account global (opcional)
          nullable: true

    TenantSettingsHttpRequest:
      type: object
      required: [tenantId, systemPrompt]
      properties:
        tenantId:
          type: string
        systemPrompt:
          type: string
        whatsappProviderType:
          type: string
          nullable: true
        whatsappApiKey:
          type: string
          nullable: true
        whatsappInstanceId:
          type: string
          nullable: true
        whatsappBaseUrl:
          type: string
          nullable: true
        googleCalendarId:
          type: string
          nullable: true

    IngestErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    IngestHttpResponse:
      type: object
      required: [chunksIngested]
      properties:
        chunksIngested:
          type: integer
          format: int32

    WhatsAppWebhookResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: processed
          description: Valores comuns — `processed`, `ignored`

    BotSettingsPutRequest:
      type: object
      required: [botPersonality]
      properties:
        botPersonality:
          type: string
          description: Texto mapeado para o system prompt do tenant

    WhatsAppWebhookSimpleBody:
      type: object
      required: [from]
      properties:
        from:
          type: string
          description: Número do remetente (aceita máscara; servidor extrai dígitos)
        text:
          type: string
        message:
          type: string
          description: Alternativa ao campo `text`

    WhatsAppWebhookMetaEnvelope:
      type: object
      description: Subconjunto do webhook Cloud API da Meta (estrutura `entry/changes/value/messages`)
      properties:
        entry:
          type: array
          items:
            type: object
            additionalProperties: true

    WhatsAppWebhookEvolutionMessagesUpsert:
      type: object
      required: [event, data]
      properties:
        event:
          type: string
          example: messages.upsert
        data:
          type: object
          required: [key, message]
          properties:
            key:
              type: object
              properties:
                remoteJid:
                  type: string
                fromMe:
                  type: boolean
            message:
              type: object
              additionalProperties: true
            messageType:
              type: string
