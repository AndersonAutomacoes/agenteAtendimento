spring:
  application:
    name: cerebro
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      # Sem OPENAI_API_KEY: estes beans falham ao arrancar (stack só Gemini por defeito).
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/cerebro}
    username: ${SPRING_DATASOURCE_USERNAME:cerebro}
    password: ${SPRING_DATASOURCE_PASSWORD:cerebro}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:cerebroredis}
  ai:
    model:
      chat: google-genai
      # Obrigatório: valor "google-genai" ativa o GoogleGenAiTextEmbeddingAutoConfiguration (não usar só "model" aqui).
      embedding:
        text: google-genai
    google:
      genai:
        # Chat Gemini (bean googleGenAiChatModel). Embeddings RAG usam spring.ai.google.genai.embedding.* abaixo.
        # Se só a chave de embedding estiver definida, o AI Studio pode mostrar tráfego sem o chat funcionar.
        api-key: ${GEMINI_API_KEY:${GOOGLE_AI_API_KEY:${SPRING_AI_GOOGLE_GENAI_API_KEY:}}}
        # Ligação de embeddings (pode usar a mesma chave que o chat ou SPRING_AI_GOOGLE_GENAI_EMBEDDING_API_KEY).
        embedding:
          api-key: ${GEMINI_API_KEY:${GOOGLE_AI_API_KEY:${SPRING_AI_GOOGLE_GENAI_EMBEDDING_API_KEY:}}}
          # Nome do modelo de embedding (não confundir com spring.ai.model.embedding.text acima).
          # gemini-embedding-001 pode devolver >2000 dimensões; pgvector HNSW só indexa até 2000 — sem isto o CREATE INDEX falha.
          text:
            options:
              model: gemini-embedding-001
              dimensions: 768
        chat:
          options:
            # No free tier, gemini-2.0-flash pode aparecer com quota 0 (429 limit:0). Use 1.5 Flash ou ative faturação.
            model: ${GEMINI_CHAT_MODEL:gemini-2.5-flash-lite}
    vectorstore:
      pgvector:
        initialize-schema: ${SPRING_AI_VECTORSTORE_PGVECTOR_INITIALIZE_SCHEMA:false}
        # Obrigatório com HNSW: pgvector limita HNSW a 2000 dim.; sem isto o builder usa EmbeddingModel.dimensions() (ex.: 3072).
        dimensions: 768
        schema-name: public
        table-name: vector_store
        index-type: HNSW
        distance-type: COSINE_DISTANCE    

cerebro:
  # Schema-per-tenant (PostgreSQL search_path + Hibernate SCHEMA). false = comportamento actual (tudo em public).
  multitenancy:
    enabled: ${CEREBRO_MULTITENANCY_ENABLED:false}
    header-name: ${CEREBRO_MULTITENANCY_HEADER:X-AxeZap-Tenant}
    default-schema: public
    # tenantId lógico → nome do schema físico (ex.: oficina legada continua em public).
    tenant-schemas:
      "oficina": public
      "oficina_ssa_01": oficina_ssa_01
      "oficina_ssa_02": oficina_ssa_02
  firebase:
    # true = inicializa o SDK (conta de serviço / ADC obrigatórios). false = não arranca o Firebase (Docker/local sem credenciais).
    # Em produção com Auth: CEREBRO_FIREBASE_ENABLED=true + GOOGLE_APPLICATION_CREDENTIALS ou FIREBASE_SERVICE_ACCOUNT_JSON_PATH.
    enabled: ${CEREBRO_FIREBASE_ENABLED:true}
    project-id: ${FIREBASE_PROJECT_ID:}
    service-account-json-path: ${FIREBASE_SERVICE_ACCOUNT_JSON_PATH:}
  # Origens do painel (Next) para CORS — várias separadas por vírgula. HML: incluir http://<IP_VPS>:3000
  cors:
    allowed-origins: ${CEREBRO_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  analytics:
    categorization:
      enabled: true
      max-conversations-per-run: 500
      max-user-text-chars: 4000
    chat:
      enabled: true
      history-lookback-days: 2
      max-history-messages: 20
      max-transcript-chars: 12000
    intents:
      enabled: true
      message-threshold: 6
      session-lookback-days: 7
      max-transcript-messages: 48
      max-transcript-chars: 12000
      inactivity-classification-enabled: true
      inactivity-minutes: 30
      max-classifications-per-run: 200
  ai:
    default-chat-provider: GEMINI
    # Chat OpenAI (beans OpenAiChatModel) só se true; por defeito só Gemini — sem chamadas à API OpenAI.
    openai-chat-enabled: false
  google:
    calendar:
      # true = mock local; false = GoogleCalendarService (google-api-client) + credentials.json no classpath ou SA em path.
      mock: ${CEREBRO_GOOGLE_CALENDAR_MOCK:false}
      service-account-json-path: ${GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON_PATH:}
      # ID do calendário (ou omissa para usar client_email do JSON). Ex.: primary da SA ou calendário partilhado.
      # Agenda "Oficina" (partilhada com a service account). Sobrescreva com CEREBRO_GOOGLE_CALENDAR_ID se necessário.
      calendar-id: ${CEREBRO_GOOGLE_CALENDAR_ID:40b149d56c987f5c2511159d628af7383cb9194068386363ba9f1067362872ac@group.calendar.google.com}
      credentials-classpath: credentials.json
      zone: ${CEREBRO_GOOGLE_CALENDAR_ZONE:America/Bahia}
      slot-minutes: 30
      work-start-hour: 9
      work-end-hour: 18
  # Card de confirmação no WhatsApp após create_appointment bem-sucedido; maps-url envia segunda mensagem só com o link.
  appointment:
    confirmation:
      location-line: "Oficina AxeZap - Salvador, BA"
      maps-url: ${CEREBRO_APPOINTMENT_MAPS_URL:https://maps.app.goo.gl/nAVH3fcubmPUMBmh7}
  mail:
    invite:
      enabled: ${CEREBRO_MAIL_INVITE_ENABLED:false}
      provider: ${CEREBRO_MAIL_INVITE_PROVIDER:}
      resend-api-key: ${RESEND_API_KEY:}
      from-email: ${CEREBRO_MAIL_INVITE_FROM_EMAIL:}
      from-name: ${CEREBRO_MAIL_INVITE_FROM_NAME:}
      registration-url: ${CEREBRO_MAIL_INVITE_REGISTRATION_URL:}
      support-email: ${CEREBRO_MAIL_INVITE_SUPPORT_EMAIL:}
  stt:
    groq:
      api-key: ${GROQ_API_KEY:}
      api-url: ${GROQ_API_URL:https://api.groq.com/openai/v1/audio/transcriptions}
      model: ${GROQ_STT_MODEL:whisper-large-v3}
      language: ${GROQ_STT_LANGUAGE:pt}
      request-timeout-ms: ${GROQ_STT_REQUEST_TIMEOUT_MS:2000}
  # Webhook WhatsApp: número (só dígitos) → tenantId (string). A persona do bot NÃO vem daqui:
  # vem da tabela PostgreSQL tenant_configuration (system_prompt) para esse mesmo tenant_id.
  # O valor à direita tem de coincidir com o tenantId usado no dashboard / PUT .../tenant/settings.
  whatsapp:
    # Versão do path Graph API (ex.: v21.0) para POST .../{phone-number-id}/messages
    meta:
      graph-api-version: ${CEREBRO_WHATSAPP_META_GRAPH_VERSION:v21.0}
    # Se não vazio, substitui whatsapp_base_url do tenant nas chamadas HTTP à Evolution.
    # Em Docker, use http://evolution-api:8080 — dentro do container cerebro-api, localhost não é o serviço Evolution.
    evolution:
      base-url-override: ${CEREBRO_WHATSAPP_EVOLUTION_BASE_URL:}
      # sendButtons (Baileys) costuma devolver 201 mas o cliente não mostra botões; false = lista só em texto formatado.
      send-interactive-buttons: ${CEREBRO_WHATSAPP_EVOLUTION_SEND_INTERACTIVE_BUTTONS:false}
      # Só aplicável se send-interactive-buttons=true: duplica horários em texto após sendButtons.
      mirror-slots-as-plain-text: ${CEREBRO_WHATSAPP_EVOLUTION_MIRROR_SLOTS_TEXT:false}
    # Idempotência: mesmo id de mensagem (Evolution key.id / Meta) não processa duas vezes (reentregas / retries).
    inbound-dedupe:
      enabled: ${CEREBRO_WHATSAPP_INBOUND_DEDUPE_ENABLED:true}
      ttl-seconds: ${CEREBRO_WHATSAPP_INBOUND_DEDUPE_TTL_SECONDS:172800}
      key-prefix: ${CEREBRO_WHATSAPP_INBOUND_DEDUPE_KEY_PREFIX:wa:in}
    # Número (só dígitos) → tenantId. Por omissão tenta-se o interlocutor; se não existir entrada, usa-se o campo
    # "sender" do webhook Evolution (telefone da linha/instância). Alinhe com os dígitos reais do Evolution Manager.
    tenants:
      "557196248348": "oficina"
    # Evolution: nome da instância (campo instance / instanceName no JSON) → tenantId
    instance-tenants: {}

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /
      path-mapping:
        health: health
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Camel expõe o REST DSL no Servlet dedicado (evita colisão com o DispatcherServlet do Spring MVC).
camel:
  servlet:
    mapping:
      context-path: /api/*

chat:
  circuit:
    # Inclui Redis + embedding (RAG) + chat Gemini + Redis; 15s pode disparar fallback com latência real.
    timeout-ms: 45000

# Resilience4j: retry (3 tentativas, backoff). Timeout 10s na Evolution: HttpRequest.timeout em EvolutionOutboundHttp.
# @TimeLimiter síncrono não é suportado (Resilience4j Spring 6 exige CompletionStage).
resilience4j:
  retry:
    instances:
      evolutionApi:
        maxAttempts: 3
        waitDuration: 200ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      googleCalendarApi:
        maxAttempts: 3
        waitDuration: 200ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

# Contrato único: classpath/static/openapi.yaml — UI em /swagger-ui/index.html
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    url: /openapi.yaml
    path: /swagger-ui.html
